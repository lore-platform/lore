<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Extraction Lab</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════
     Navigation bar — hidden until signed in
     ═══════════════════════════════════════════════════════════════════ -->
<nav class="lab-nav" id="lab-nav" style="display:none">
  <span class="lab-nav-title">Knowledge Extraction Lab</span>
  <div class="lab-nav-meta">
    <span id="nav-email"></span>
    <button id="nav-signout" class="btn-ghost btn-sm">Sign out</button>
  </div>
</nav>

<!-- ═══════════════════════════════════════════════════════════════════════
     Auth screen — uses root .auth-screen / .auth-card classes
     ═══════════════════════════════════════════════════════════════════ -->
<div id="view-auth" style="display:none">
  <div class="auth-screen">

    <p class="auth-wordmark">Lab</p>
    <p class="auth-tagline">Knowledge Extraction Lab</p>

    <div class="auth-card">

      <!-- Tab row: Sign in / Create account -->
      <div class="lab-tab-row">
        <button id="tab-signin" class="lab-tab active">Sign in</button>
        <button id="tab-signup" class="lab-tab">Create account</button>
      </div>

      <!-- Error banner — shown via .visible class (matches root CSS pattern) -->
      <div id="auth-err" class="auth-error"></div>

      <!-- Sign-in form -->
      <form id="form-signin">
        <div class="auth-field">
          <label class="label" for="si-email">Email</label>
          <input class="input" type="email" id="si-email"
            placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="auth-field">
          <label class="label" for="si-password">Password</label>
          <input class="input" type="password" id="si-password"
            placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="btn-signin">
          Sign in
        </button>
      </form>

      <!-- Create account form -->
      <form id="form-signup" style="display:none">
        <div class="auth-field">
          <label class="label" for="su-email">Email</label>
          <input class="input" type="email" id="su-email"
            placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="auth-field">
          <label class="label" for="su-password">Password</label>
          <input class="input" type="password" id="su-password"
            placeholder="At least 8 characters" autocomplete="new-password"
            minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="btn-signup">
          Create account
        </button>
      </form>

    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     View containers — each view module renders into its own div.
     All start hidden; app.js shows the active one via style.display.
     (The root style.css hides #view-auth and #view-profile via CSS rules;
     our JS always sets style.display explicitly, which overrides CSS.)
     ═══════════════════════════════════════════════════════════════════ -->
<div id="view-profile"     style="display:none"></div>
<div id="view-sorting"     style="display:none"></div>
<div id="view-cue-review"  style="display:none"></div>
<div id="view-options"     style="display:none"></div>
<div id="view-session"     style="display:none"></div>
<div id="view-model-view"  style="display:none"></div>
<div id="view-elicitation" style="display:none"></div>
<div id="view-recipe"      style="display:none"></div>
<div id="view-transfer"    style="display:none"></div>
<div id="view-summary"     style="display:none"></div>

<script type="module" src="./app.js"></script>
</body>
</html>
