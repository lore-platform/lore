<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LORE — Organisational knowledge transfer platform">
    <title>LORE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Auth screen — shown when no user is signed in -->
    <div id="view-auth" class="active">

        <!-- Standard sign-in — shown when no invite param is present -->
        <div id="screen-signin" class="auth-screen">
            <p class="auth-wordmark">LORE</p>
            <p class="auth-tagline">What your best people know</p>

            <div class="auth-card">
                <h2 style="margin-bottom: var(--space-6);">Sign in</h2>

                <div id="auth-error" class="auth-error"></div>

                <div class="auth-field">
                    <label class="label" for="auth-email">Email</label>
                    <input
                        class="input"
                        id="auth-email"
                        type="email"
                        placeholder="your@email.com"
                        autocomplete="email"
                    >
                </div>

                <div class="auth-field">
                    <label class="label" for="auth-password">Password</label>
                    <div style="position: relative;">
                        <input
                            class="input"
                            id="auth-password"
                            type="password"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            style="padding-right: 2.8rem;"
                        >
                        <button
                            type="button"
                            id="auth-pw-toggle"
                            aria-label="Show password"
                            style="position:absolute;right:var(--space-3);top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:var(--warm-grey);font-size:var(--text-sm);line-height:1;"
                        >Show</button>
                    </div>
                </div>

                <button class="btn btn-primary btn-full" id="auth-submit">
                    Sign in
                </button>
            </div>
        </div>

        <!-- Invite screen — shown when ?invite= is present in the URL -->
        <!-- Populated by initAuth() once the invite document is read -->
        <div id="screen-invite" class="auth-screen" style="display: none;">

            <!-- Org identity bar — filled in by app.js with the org name -->
            <div id="invite-org-bar" style="
                text-align: center;
                margin-bottom: var(--space-8);
            ">
                <p class="auth-wordmark" style="margin-bottom: var(--space-1);">LORE</p>
                <p id="invite-org-name" class="auth-tagline" style="font-size: var(--text-base);"></p>
            </div>

            <div class="auth-card">
                <div id="auth-error" class="auth-error" style="display:none;"></div>

                <!-- Context line — e.g. "Judith, you've been invited to join Calloway & Partners" -->
                <p id="invite-context" style="
                    font-size: var(--text-base);
                    font-weight: 600;
                    margin-bottom: var(--space-2);
                    line-height: 1.4;
                "></p>
                <p id="invite-role-line" style="
                    color: var(--warm-grey);
                    font-size: var(--text-sm);
                    margin-bottom: var(--space-6);
                    line-height: 1.5;
                "></p>

                <div class="auth-field">
                    <label class="label" for="invite-name">Your full name</label>
                    <input
                        class="input"
                        id="invite-name"
                        type="text"
                        placeholder="First and last name"
                        autocomplete="name"
                    >
                </div>

                <div class="auth-field">
                    <label class="label" for="invite-email-display">Email</label>
                    <input
                        class="input"
                        id="invite-email-display"
                        type="email"
                        disabled
                        style="opacity: 0.6; cursor: not-allowed;"
                    >
                </div>

                <div class="auth-field">
                    <label class="label" for="invite-password">Choose a password</label>
                    <div style="position: relative;">
                        <input
                            class="input"
                            id="invite-password"
                            type="password"
                            placeholder="At least 8 characters"
                            autocomplete="new-password"
                            style="padding-right: 2.8rem;"
                        >
                        <button
                            type="button"
                            id="invite-pw-toggle"
                            aria-label="Show password"
                            style="position:absolute;right:var(--space-3);top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:var(--warm-grey);font-size:var(--text-sm);line-height:1;"
                        >Show</button>
                    </div>
                </div>

                <button class="btn btn-primary btn-full" id="invite-submit" style="margin-top: var(--space-2);">
                    Accept invite
                </button>

                <p style="
                    text-align: center;
                    font-size: var(--text-xs);
                    color: var(--warm-grey);
                    margin-top: var(--space-4);
                    line-height: 1.5;
                ">This invite expires in 7 days and can only be used once.</p>
            </div>
        </div>

        <!-- Loading state — shown briefly while the invite document is fetched -->
        <div id="screen-invite-loading" class="auth-screen" style="display: none;">
            <p class="auth-wordmark">LORE</p>
            <div class="spinner" style="margin-top: var(--space-8);"></div>
        </div>

        <!-- Invalid invite state — shown if the invite is not found, expired, or redeemed -->
        <div id="screen-invite-invalid" class="auth-screen" style="display: none;">
            <p class="auth-wordmark">LORE</p>
            <div class="auth-card" style="margin-top: var(--space-8); text-align: center;">
                <p style="font-weight: 600; margin-bottom: var(--space-3);">This invite isn't valid</p>
                <p style="color: var(--warm-grey); font-size: var(--text-sm); line-height: 1.6;">
                    It may have expired, already been used, or the link may be incomplete.
                    Ask your manager to send you a new invite.
                </p>
            </div>
        </div>

    </div>

    <!-- Shared navigation — shown for all authenticated views -->
    <nav class="nav" id="app-nav" style="display: none;">
        <a class="lore-wordmark" href="/">LORE</a>
        <div class="nav-right">
            <!-- XP and streak shown for Employees only -->
            <span class="nav-stat" id="nav-xp" style="display: none;">
                <strong id="nav-xp-value">0</strong> XP
            </span>
            <span class="nav-stat" id="nav-streak" style="display: none;">
                <strong id="nav-streak-value">0</strong> day streak
            </span>
            <!-- Rank badge shown for Employees only -->
            <span id="nav-rank" class="rank-badge" style="display: none;"></span>
            <!-- Sign-out shown for all authenticated roles -->
            <button
                id="nav-signout"
                class="btn btn-secondary"
                style="display: none; font-size: var(--text-xs); padding: var(--space-1) var(--space-3); color: var(--warm-grey);"
            >Sign out</button>
        </div>
    </nav>

    <!-- Training view — Employees -->
    <div id="view-training">
        <div class="main" id="training-content">
            <!-- Rendered by training.js -->
        </div>
    </div>

    <!-- Tasks view — Reviewers -->
    <div id="view-tasks">
        <div class="main" id="tasks-content">
            <!-- Rendered by tasks.js -->
        </div>
    </div>

    <!-- Dashboard view — Managers -->
    <div id="view-dashboard">
        <div class="main" id="dashboard-content">
            <!-- Rendered by dashboard.js -->
        </div>
    </div>

    <!-- Profile view — Manager per-Employee view -->
    <div id="view-profile">
        <div class="main" id="profile-content">
            <!-- Rendered by profile.js -->
        </div>
    </div>

    <!-- Firebase and app entry point -->
    <script type="module" src="firebase.js"></script>
    <script type="module" src="app.js"></script>

</body>
</html>
